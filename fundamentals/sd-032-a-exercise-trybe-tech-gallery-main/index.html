<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trybe Tech-Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
    <header class="header-container">
    <img class="header-img" src="images/trybe-logo.jpg" alt="trybe-header-img">
    <h4 class="header-title">Trybe Tech-Gallery</h4>
    <a class="header-login" href="">SIGN-IN</a>
    </header>
    <section class="text-section">
        <p>Take a look at some of the technologies wich you will learn in your fundamentals and fron-ent module!</p>
    </section>
    <br>
    <section class="gallery">

        <section class="tech-card">
            <h4>HTML</h4>
            <img class="image" src="images/html-logo.png" alt="">
        </section>

        <section class="tech-card">
            <h4>CSS</h4>
            <img class="image" src="images/css-logo.png" alt="">
        </section>

        <section class="tech-card">
            <h4>JAVASCRIPT</h4>
            <img class="image" src="images/javaScript-logo.png" alt="">
        </section>

        <section class="tech-card">
            <h4>REACT</h4>
            <img class="image" src="images/react-logo.png" alt="">
        </section>

        <section class="tech-card">
           <h4>RTL</h4>
           <img class="image" src="images/rtl-logo.png" alt="">  
        </section>

        <section class="tech-card">
            <h4>REDUC</h4>
            <img class="image" src="images/redux-logo.png" alt="">
        </section>

    </section>
    <br>
    <section class="line">____________________________</section>
    <section class="line">More informations below:</section>
    <br>
    <footer class="footer-container">
        <a href=""><img class="social-instagram socials" src="images/instagram-logo.png" alt="my-instagram"></a>
        <a href=""><img class="social-linkedin socials" src="images/linked-in-logo.png" alt="my-linkedin"><a href=""></a>
    </footer>
    <br>
    <script src="script.js"></script>
</body>
</html>
